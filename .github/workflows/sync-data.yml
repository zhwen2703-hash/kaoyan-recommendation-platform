name: Sync official admission data

on:
  schedule:
    - cron: "20 0,6,12,18 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: admission-data-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Preserve verified baseline
        run: cp data/408-offerings.json data/.previous-408.json
      - name: Sync admission units
        run: npm run sync:data
      - name: Sync strict 408 offerings
        run: npm run sync:408 -- --force
      - name: Validate snapshot
        run: npm run validate:snapshot && npm test
      - name: Commit changed snapshots
        run: |
          git config user.name "admission-data-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/admission-units.json data/408-offerings.json data/snapshots
          git diff --cached --quiet || git commit -m "data: refresh official admission snapshots"
          git push
      - name: Deploy refreshed data to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: npx vercel --prod --yes --token="$VERCEL_TOKEN"
