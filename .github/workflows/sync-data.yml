name: Sync official admission data

on:
  schedule:
    - cron: "20 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: admission-data-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Sync admission units
        run: npm run sync:data
      - name: Sync strict 408 offerings
        run: npm run sync:408 -- --force
      - name: Validate snapshot
        run: npm test
      - name: Commit changed snapshots
        run: |
          git config user.name "admission-data-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/admission-units.json data/408-offerings.json
          git diff --cached --quiet || git commit -m "data: refresh official admission snapshots"
          git push
